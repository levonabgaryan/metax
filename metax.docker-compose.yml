services:
  metax:
    build:
      dockerfile: ./Dockerfile.base
    env_file: ".env"
    container_name: metax
    ports:
      - "${DJANGO_SERVER_PORT}:8000"
    networks:
      - metax-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthcheck/').getcode()"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      metax-opensearch-db:
        condition: service_healthy
      metax-redis:
        condition: service_healthy
      metax-postgres-db:
        condition: service_healthy
    logging:
      driver: gelf
      options:
        gelf-address: "udp://${FLUENT_BIT_HOST}:${FLUENT_BIT_PORT}"
        tag: "metax"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  metax-postgres-db:
    image: postgres:18.1-alpine3.23
    env_file: ".env"
    container_name: metax-postgres-db
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - metax-net
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  metax-opensearch-db:
    image: opensearchproject/opensearch:3.4.0
    env_file: ".env"
    container_name: metax-opensearch-db
    environment:
      - discovery.type=single-node
      - cluster.name=opensearch-cluster
      - bootstrap.memory_lock=true # Lock the process memory to RAM, preventing it from being swapped out to disk for better performance
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g" # Set JVM heap size (Minimum and Maximum). Should be 50% of available RAM, but no more than 32GB.
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD}
    ulimits:
      memlock: # Disable memory swapping for the process (needed for bootstrap.memory_lock)
        soft: -1
        hard: -1
      nofile: # Increase the limit for open file descriptors (OpenSearch handles many small files/shards)
        soft: 65536
        hard: 65536
    volumes:
      - os_data:/usr/share/opensearch/data
    ports:
      - "${OPENSEARCH_NODE_PORT}:9200"
    healthcheck:
      test: [ "CMD-SHELL", "curl -k --silent --fail -u admin:${OPENSEARCH_ADMIN_PASSWORD} https://localhost:9200/_cluster/health || exit 1" ]
      interval: 20s
      timeout: 30s
      retries: 3
    # https://docs.opensearch.org/1.3/install-and-configure/plugins/#:~:text=%24%20sudo%20./opensearch%2Dplugin%20install%20analysis%2Dicu
    entrypoint: >
      /bin/bash -c "
      /usr/share/opensearch/bin/opensearch-plugin install --batch analysis-icu;
      /usr/share/opensearch/opensearch-docker-entrypoint.sh
      "
    networks:
      - metax-net

  merax-celery:
    build:
      dockerfile: ./Dockerfile.base
    env_file: ".env"
    container_name: metax-celery
    command: celery_framework -A metax.frameworks_and_drivers.celery_framework.celery_application worker -B -l info
    networks:
      - metax-net
    depends_on:
      metax:
        condition: service_healthy
    logging:
      driver: gelf
      options:
        gelf-address: "udp://${FLUENT_BIT_HOST}:${FLUENT_BIT_PORT}"
        tag: "metax-celery"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  metax-redis:
    image: redis:8.4.0-alpine
    container_name: metax-redis
    env_file: ".env"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
    command: redis-server --requirepass "$REDIS_PASSWORD"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - metax-net

volumes:
  os_data:
  redis_data:
  pgdata:


networks:
  metax-net:
