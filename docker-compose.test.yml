# CI / integration test stack (full Docker deployment, no logging aggregator).
#
# Every value is hardcoded so the file works without any `.env` on disk - this
# is critical for reproducible CI runs. The hardcoded values match the defaults
# in `TestConfigs` (metax_configs.py).
#
# Run with:
#   docker compose -f docker-compose.test.yml up -d --build --wait

x-postgres-db-env: &postgres-db-env
  POSTGRES_USER: p_user_test
  POSTGRES_PASSWORD: pass_test_111
  POSTGRES_DB: metax_test

x-opensearch-db-env: &opensearch-db-env
  discovery.type: single-node
  cluster.name: metax-cluster
  bootstrap.memory_lock: "true"
  OPENSEARCH_JAVA_OPTS: "-Xms1g -Xmx1g"
  OPENSEARCH_INITIAL_ADMIN_PASSWORD: "Os_Test_Secret_2026!"

x-redis-env: &redis-env
  REDIS_PASSWORD: "R_Test_Secret_2026!"

# Fluent-bit substitutes these into fluent-bit.conf. The metax/taskiq apps don't use them.
x-metax-fluent-bit-env: &metax-fluent-bit-env
  LOG_SERVER_HOST: "mock"
  LOG_SERVER_PORT: 0
  LOG_SERVER_USER: "mock"
  LOG_SERVER_PASSWORD: "mock"

x-metax-env: &metax-env
  ENV: test

services:
  metax-postgres-db:
    extends:
      file: docker-compose.base.yml
      service: metax-postgres-db
    environment: *postgres-db-env
    networks:
      - metax-net

  metax-opensearch-db:
    extends:
      file: docker-compose.base.yml
      service: metax-opensearch-db
    environment: *opensearch-db-env
    networks:
      - metax-net

  metax-redis:
    extends:
      file: docker-compose.base.yml
      service: metax-redis
    environment: *redis-env
    networks:
        - metax-net

  metax-fluent-bit:
    extends:
      service: metax-fluent-bit
      file: docker-compose.logging.yml
    environment: *metax-fluent-bit-env
    networks:
      - metax-net
    # No `ports:` — in test the metax service does not use the fluentd logging
    # driver (it extends docker-compose.metax.yml directly), so nothing needs to
    # reach fluent-bit from the host. Containers on metax-net talk by service
    # name on the internal 24224 port if ever needed.
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro

  metax:
    extends:
      file: docker-compose.metax.yml
      service: metax
    environment: *metax-env
    depends_on:
      metax-postgres-db:
        condition: service_healthy
      metax-opensearch-db:
        condition: service_healthy
      metax-redis:
        condition: service_healthy
      metax-fluent-bit:
        condition: service_started
    networks:
      - metax-net

  metax-taskiq:
    extends:
      file: docker-compose.taskiq.yml
      service: metax-taskiq
    depends_on:
      metax:
        condition: service_healthy
    networks:
      - metax-net

networks:
  metax-net:
    name: metax-net
