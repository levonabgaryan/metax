name: PR Quality Check

on:
  pull_request:
    branches:
      - dev
    types: [opened, synchronize, reopened]

jobs:
  run-quality-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Set system limits for OpenSearch and Redis
        run: |
          sudo sysctl -w vm.max_map_count=262144
          sudo sysctl -w vm.overcommit_memory=1

      - name: Validate fluent-bit config
        run: |
          docker compose -f docker-compose.test.yml run --rm --no-deps \
            metax-fluent-bit /fluent-bit/bin/fluent-bit \
            --dry-run --config /fluent-bit/etc/fluent-bit.conf

      - name: Build and run docker compose services
        run: docker compose -f docker-compose.test.yml up -d --build --wait

      - name: run ruff
        run: docker compose -f docker-compose.test.yml exec -T metax ruff check .

      - name: run mypy
        run: docker compose -f docker-compose.test.yml exec -T metax mypy .

      - name: run unit/integration tests
        run: |
          docker compose -f docker-compose.test.yml exec -T metax pytest tests/unit -v
          docker compose -f docker-compose.test.yml exec -T metax pytest tests/integration -v

      - name: Show logs on failure
        if: failure()
        run: |
          # `docker compose ps --format json` emits one JSON object per line (NDJSON),
          # not a JSON array. Use `.State` (values: running / exited / created / restarting),
          # not `.Status` (which is a human string like "Up 5 seconds (healthy)").
          FAILED_SERVICES=$(docker compose -f docker-compose.test.yml ps -a --format json \
            | jq -r 'select(.State != "running") | .Service')
          if [ -z "$FAILED_SERVICES" ]; then
            echo "No non-running services. The failure is in a test/lint step above; showing all logs as fallback:"
            docker compose -f docker-compose.test.yml logs --tail=200
          else
            for service in $FAILED_SERVICES; do
              echo "--- LOGS FOR SERVICE: $service ---"
              docker compose -f docker-compose.test.yml logs "$service"
            done
          fi

      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose.test.yml down -v