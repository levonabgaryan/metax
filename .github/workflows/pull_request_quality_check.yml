name: PR Quality Check

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

env:
  ENV: ${{ secrets.ENV }}
  DEBUG: "False"
  DISCOUNT_SERVICE_OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${{ secrets.DISCOUNT_SERVICE_OPENSEARCH_INITIAL_ADMIN_PASSWORD }}
  DISCOUNT_SERVICE_OPENSEARCH_USER: ${{ secrets.DISCOUNT_SERVICE_OPENSEARCH_USER }}
  DISCOUNT_SERVICE_OPENSEARCH_NODE_HOST: ${{ secrets.DISCOUNT_SERVICE_OPENSEARCH_NODE_HOST }}
  DISCOUNT_SERVICE_OPENSEARCH_NODE_PORT: ${{ secrets.DISCOUNT_SERVICE_OPENSEARCH_NODE_PORT }}

jobs:
  lint-and-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy -r requirements.txt

      - name: Run Ruff
        run: ruff check

      - name: Run Type Checker
        run: mypy .

  tests:
    needs: lint-and-types
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Configure sysctl for OpenSearch
        run: sudo sysctl -w vm.max_map_count=262144

      - name: Prepare environment for Docker
        working-directory: ./
        run: |
          echo "DISCOUNT_SERVICE_OPENSEARCH_INITIAL_ADMIN_PASSWORD=$DISCOUNT_SERVICE_OPENSEARCH_INITIAL_ADMIN_PASSWORD" > .env
          echo "DISCOUNT_SERVICE_OPENSEARCH_USER=$DISCOUNT_SERVICE_OPENSEARCH_USER" >> .env
          echo "DISCOUNT_SERVICE_OPENSEARCH_NODE_HOST=$DISCOUNT_SERVICE_OPENSEARCH_NODE_HOST" >> .env
          echo "DISCOUNT_SERVICE_OPENSEARCH_NODE_PORT=$DISCOUNT_SERVICE_OPENSEARCH_NODE_PORT" >> .env

      - name: Run Docker containers
        working-directory: ./
        run: docker compose -f metax.docker-compose.yml up -d

      - name: Wait for OpenSearch
        run: |
          for i in {1..20}; do
            if curl -k -s -u admin:${{ env.DISCOUNT_SERVICE_OPENSEARCH_INITIAL_ADMIN_PASSWORD }} https://localhost:9200/_cluster/health | grep -q 'status'; then
              echo "OpenSearch is ready!"
              exit 0
            fi
            echo "Waiting for OpenSearch (attempt $i)..."
            sleep 5
          done
          docker logs discount-service-opensearch-node
          exit 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest -r requirements.txt

      - name: Run unit tests
        run: pytest tests/unit
      - name: Run integration tests
        run: pytest tests/integration

      - name: Stop containers
        if: always()
        working-directory: ./
        run: docker compose -f metax.docker-compose.yml down