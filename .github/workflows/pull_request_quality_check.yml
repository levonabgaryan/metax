name: PR Quality Check

on:
  pull_request:
    branches:
      - dev
    types: [opened, synchronize, reopened]

jobs:
  run-quality-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build and run docker compose services
        run: docker compose -f docker-compose.test.yml up -d --build --wait

      - name: run ruff
        run: docker compose -f docker-compose.test.yml exec -T metax ruff check .

      - name: run mypy
        run: docker compose -f docker-compose.test.yml exec -T metax mypy .

      - name: run unit/integration tests
        run: docker compose -f docker-compose.test.yml exec -T metax pytest unit/integration

      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose.test.yml down -v