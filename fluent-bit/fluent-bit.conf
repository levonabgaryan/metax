[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020

[INPUT]
    Name         forward
    Listen       0.0.0.0
    Port         24224

[FILTER]
    Name         parser
    Match        *
    Key_Name     log
    Parser       metax_python_parser
    Preserve_Key Off
    Reserve_Data On

[FILTER]
    Name         record_modifier
    Match        *
    Remove_key   log_time


[OUTPUT]
    Name            opensearch
    Match           *
    Host            ${LOG_SERVER_HOST}
    Port            ${LOG_SERVER_PORT}
    HTTP_User       ${LOG_SERVER_USER}
    HTTP_Passwd     ${LOG_SERVER_PASSWORD}
    TLS             On
    TLS.Verify      Off
    Index           metax-logs
    Logstash_Format On
    Logstash_Prefix metax-logs
    Suppress_Type_Name On