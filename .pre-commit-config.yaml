repos:
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        args:
          - --config-file=./pyproject.toml
          - --python-executable=./.venv/bin/python3
          - --explicit-package-bases
          - --show-traceback
          - .
        verbose: true
        require_serial: true
        pass_filenames: false
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.5
    hooks:
      - id: ruff-check
        args:
          - --fix
      - id: ruff-format
