# Fluent Bit service skeleton.
#
# Not runnable on its own. Used as a base via `extends:` from runnable top-level
# compose files (docker-compose.prod.yml, docker-compose.test.yml). This file
# contains ONLY structural config (image, comments about healthcheck). All
# concrete values — env_file, environment, ports, volumes, networks, and the
# `logging:` driver wiring on metax / metax-taskiq services — live in the
# runnable file that uses this skeleton.
#
# Note on fluentd logging driver address: the Docker daemon resolves
# logging-driver addresses on the HOST (Compose service names are unknown
# there). So the runnable compose file must (1) publish fluent-bit's internal
# port 24224 on the host loopback and (2) point `fluentd-address` at that host
# port.

services:
  metax-fluent-bit:
    image: fluent/fluent-bit:3.2.5
    # No healthcheck: the official image is distroless (no shell/wget/curl) so we
    # can't probe /api/v1/health from inside. Misconfigured fluent-bit exits at
    # startup anyway, which `condition: service_started` is enough to catch.
    # Config syntax is validated separately via `fluent-bit --dry-run` in CI.
