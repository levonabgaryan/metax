services:
  backend:
    build:
      dockerfile: ./Dockerfile.base
    env_file: ".env"
    container_name: backend
    ports:
      - "${DJANGO_SERVER_PORT}:8000"
    networks:
      - discount-service-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/healthcheck/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      opensearch-node:
        condition: service_healthy
      redis:
        condition: service_healthy

  opensearch-node:
    image: opensearchproject/opensearch:3.4.0
    env_file: ".env"
    container_name: opensearch-node
    environment:
      - discovery.type=single-node
      - cluster.name=opensearch-cluster
      - bootstrap.memory_lock=true # Lock the process memory to RAM, preventing it from being swapped out to disk for better performance
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g" # Set JVM heap size (Minimum and Maximum). Should be 50% of available RAM, but no more than 32GB.
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${DISCOUNT_SERVICE_OPENSEARCH_INITIAL_ADMIN_PASSWORD}
    ulimits:
      memlock: # Disable memory swapping for the process (needed for bootstrap.memory_lock)
        soft: -1
        hard: -1
      nofile: # Increase the limit for open file descriptors (OpenSearch handles many small files/shards)
        soft: 65536
        hard: 65536
    volumes:
      - os_data:/usr/share/opensearch/data
    ports:
      - "${DISCOUNT_SERVICE_OPENSEARCH_NODE_PORT}:9200"
    healthcheck:
      test: [ "CMD-SHELL", "curl -k --silent --fail -u admin:${DISCOUNT_SERVICE_OPENSEARCH_INITIAL_ADMIN_PASSWORD} https://localhost:9200/_cluster/health || exit 1" ]
      interval: 20s
      timeout: 30s
      retries: 3
    # https://docs.opensearch.org/1.3/install-and-configure/plugins/#:~:text=%24%20sudo%20./opensearch%2Dplugin%20install%20analysis%2Dicu
    entrypoint: >
      /bin/bash -c "
      /usr/share/opensearch/bin/opensearch-plugin install --batch analysis-icu;
      /usr/share/opensearch/opensearch-docker-entrypoint.sh
      "
    networks:
      - discount-service-net

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.4.0
    env_file: ".env"
    container_name: opensearch-dashboards
    ports:
      - "${OPENSEARCH_DASHBOARD_PORT}:5601"
    environment:
      - OPENSEARCH_HOSTS=["https://opensearch-node:9200"]
      - "OPENSEARCH_USERNAME=admin"
      - "OPENSEARCH_PASSWORD=${DISCOUNT_SERVICE_OPENSEARCH_INITIAL_ADMIN_PASSWORD}"
    depends_on:
      opensearch-node:
        condition: service_healthy
    networks:
      - discount-service-net

  celery:
    build:
      dockerfile: ./Dockerfile.base
    env_file: ".env"
    container_name: celery_framework
    command: celery_framework -A discount_service.frameworks_and_drivers.celery_framework.celery_application worker -B -l info
    networks:
      - discount-service-net
    depends_on:
      backend:
        condition: service_healthy

  redis:
    image: redis:8.4.0-alpine
    container_name: redis
    env_file: ".env"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
    command: >
      sh -c '
        mkdir -p /usr/local/etc/redis && 
        echo "requirepass $REDIS_PASSWORD" > /usr/local/etc/redis/redis.conf && redis-server /usr/local/etc/redis/redis.conf
      '
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  os_data:
  redis_data:

networks:
  discount-service-net:
