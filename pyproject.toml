[tool.mypy]
strict = true
show_error_codes = true

plugins = ["mypy_django_plugin.main"]

[tool.django-stubs]
django_settings_module = "backend.frameworks_and_drivers.django_framework.django_framework.settings.dev"
strict_model_abstract_attrs = true

# Warns if function parameters and return value is not annotated
disallow_untyped_defs = true

# Warns if module components have not type hints
disallow_any_unimported = true

# Doesn't warn if function body is not annotated
check_untyped_defs = true

# Warns if function parameter by default is None, but it was not annotated
# def greet(name: str = None):  # Error!
#    print(f"Hello, {name}")
no_implicit_optional = true

# Warns if function return Any
warn_return_any = true

# Warns if there are unused `type: ignore`
warn_unused_ignores = true

# Warns if some package or library has not stubs
ignore_missing_imports = false

# Warns about redundant 'cast' calls
warn_redundant_casts = true

# Warns if code is unreachable.
warn_unreachable = true

# Warns if decorator function parameter is not annotated
disallow_untyped_decorators = true

# Warns if code is checking two different types equality (using == operator, but for None doesn't warn)
strict_equality = true

# Include None for strict_equality
strict_equality_for_none = true

# Warns if function's return is missed
warn_no_return = true

# See https://mypy.readthedocs.io/en/stable/config_file.html#confval-strict_equality:~:text=for%20more%20info.-,implicit_reexport,-%C2%B6
implicit_reexport = false

[tool.ruff]
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

line-length = 115
indent-width = 4

[tool.ruff.lint]
ignore = [
    "COM812", # check commas in collections
    "RET504",  # see https://docs.astral.sh/ruff/rules/unnecessary-assign/
    "PGH003"
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]
"*/test_*.py" = ["S101"]

extend-select = [
    "E",      # PyCodeStyle errors
    "W",      # PyCodeStyle warnings
    "I",      # Rules for sorting imports
    "S",      # flake8-bandit
    "B",      # flake8-bugbear
    "A",      # flake8-builtins
    "COM",    # flake8-commas
    "C4",     # flake8-comprehensions
    "PTH",    # Using Pathlib instead of os.path
    "SLF",    # Access protected member
    "ASYNC",  # flake8-async
    "DJ",     # flake8-django
    "DTZ",    # flake8-datetimez
    "EM",     # flake8-errmsg
    "FA",     # flake8-future-annotations
    "ISC",    # flake8-implicit-str-concat
    "ICN",    # flake8-import-conventions
    "PIE",    # flake8-pie
    "RSE",    # flake8-raise
    "RET",    # flake8-return
    "SIM",    # flake8-simplify
    "TID",    # flake8-tidy-imports
    "ARG",    # flake8-unused-arguments
    "FLY",    # flynt
    "N",      # pep8-naming
    "PERF101",# Avoid creating list/tuple from iterable unnecessarily
    "F",      # Pyflakes
    "PGH",    # pygrep-hooks
    "UP006",  # Use list/dict instead of typing.List/Dict
    "RUF007", # Prefer itertools.pairwise() over zip()
    "RUF008", # Avoid mutable default in dataclasses.field
    "RUF049", # Enum should not be a dataclass
]

[tool.ruff.format]
docstring-code-format = true
indent-style = "space"
